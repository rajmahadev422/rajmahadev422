name: Auto Commit JSON Log

on:
  schedule:
    - cron: "0 1,5,9,13,17 * * *"  # 5 times daily (UTC)
  workflow_dispatch:

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Update JSON File
        run: |
          FILE="log.json"

          # Create file if not exists
          if [ ! -f "$FILE" ]; then
            echo "[]" > $FILE
          fi

          # Generate values
          DATE=$(date '+%Y-%m-%d')
          DAY=$(date '+%A')
          TIME=$(date '+%H:%M:%S')

          # Add new JSON entry using jq
          jq --arg date "$DATE" \
             --arg day "$DAY" \
             --arg time "$TIME" \
             '. += [{"date": $date, "day": $day, "time": $time}]' \
             $FILE > tmp.json && mv tmp.json $FILE

      - name: Commit & Push
        run: |
          git add log.json
          git commit -m "Update JSON log: $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
