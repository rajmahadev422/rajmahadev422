name: Smart Auto Logger

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  smart-log:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Git
        run: |
          git config --global user.name "rajmahadev422"
          git config --global user.email "rajmahadev422@gmail.com"

      - name: Prepare Files
        run: |
          [ -f log.json ] || echo "{}" > log.json
          [ -f meta.json ] || echo "{}" > meta.json

      - name: Generate Daily Target (1 AM UTC)
        run: |
          HOUR=$(date -u '+%H')

          if [ "$HOUR" = "01" ]; then
            TARGET=$((RANDOM % 11 + 5))  # 5–15
            DATE=$(date -u '+%Y-%m-%d')

            jq --arg date "$DATE" --argjson target $TARGET \
              '.date=$date | .target=$target | .count=0' \
              meta.json > tmp.json && mv tmp.json meta.json

            echo "New target: $TARGET"
          fi

      - name: Decide Logging
        run: |
          DATE=$(date -u '+%Y-%m-%d')
          HOUR=$(date -u '+%H')

          META_DATE=$(jq -r '.date // empty' meta.json)
          TARGET=$(jq -r '.target // 5' meta.json)
          COUNT=$(jq -r '.count // 0' meta.json)

          # fallback if new day not initialized
          if [ "$META_DATE" != "$DATE" ]; then
            TARGET=5
            COUNT=0
          fi

          REMAINING=$((24 - 10#$HOUR))
          MUST_LOG=0

          if [ $((TARGET - COUNT)) -ge $REMAINING ]; then
            MUST_LOG=1
          fi

          SHOULD_LOG=$((RANDOM % 2))

          if [ "$SHOULD_LOG" -eq 1 ] || [ "$MUST_LOG" -eq 1 ]; then
            echo "LOG=true" >> $GITHUB_ENV
          else
            echo "LOG=false" >> $GITHUB_ENV
          fi

      - name: Update Log JSON (Daily Grouped)
        if: env.LOG == 'true'
        run: |
          FILE="log.json"

          DATE=$(date '+%Y-%m-%d')
          DAY=$(date '+%A')
          TIME=$(date '+%H:%M:%S')

          # Ensure file exists
          [ -f "$FILE" ] || echo "{}" > $FILE

          # Convert array → object if needed
          jq 'if type=="array" then {} else . end' $FILE > tmp.json && mv tmp.json $FILE

          # Append log under date
          jq --arg date "$DATE" \
             --arg day "$DAY" \
             --arg time "$TIME" \
             '
             .[$date] = ((.[$date] // []) + [{"day": $day, "time": $time}])[-20:]
             ' \
             $FILE > tmp.json && mv tmp.json $FILE
             
      - name: Update Meta Count
        if: env.LOG == 'true'
        run: |
          COUNT=$(jq '.count + 1' meta.json)
          jq --argjson count $COUNT '.count = $count' meta.json > tmp.json && mv tmp.json meta.json
          
      - name: Commit & Push (Safe)
        run: |
          git add log.json meta.json
          git commit -m "Smart log: $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes"

          for i in 1 2 3
          do
            git pull origin main --rebase && git push origin main && break
            echo "Retry $i..."
            sleep 2
          done
